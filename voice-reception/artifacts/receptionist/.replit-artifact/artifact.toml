kind = "web"
previewPath = "/"
title = "DEVOCEAN Receptionist"
version = "1.0.0"
id = "artifacts/receptionist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21046

[services.development]
run = "pnpm --filter @workspace/receptionist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/receptionist", "run", "build" ]
publicDir = "artifacts/receptionist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21046"
BASE_PATH = "/"
