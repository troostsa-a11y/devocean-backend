name: Codegen sync check

on:
  push:
    paths:
      - 'voice-reception/lib/api-spec/openapi.yaml'
      - 'voice-reception/lib/api-spec/orval.config.ts'
      - 'voice-reception/lib/api-client-react/src/generated/**'
      - 'voice-reception/lib/api-zod/src/generated/**'
  pull_request:
    paths:
      - 'voice-reception/lib/api-spec/openapi.yaml'
      - 'voice-reception/lib/api-spec/orval.config.ts'
      - 'voice-reception/lib/api-client-react/src/generated/**'
      - 'voice-reception/lib/api-zod/src/generated/**'

jobs:
  check-codegen-sync:
    name: Generated client in sync with openapi.yaml
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voice-reception
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: voice-reception/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated client is in sync
        run: pnpm run check-codegen-sync
