services:
  - type: worker
    name: devocean-automailer
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: render-automailer
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: IMAP_HOST
        sync: false
      - key: IMAP_PORT
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: IMAP_TLS
        sync: false
      - key: IMAP_FROM_EMAIL
        sync: false
      - key: IMAP_FROM_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: BCC_EMAIL
        sync: false
      - key: TAXI_EMAIL
        sync: false
      - key: TAXI_WHATSAPP
        sync: false
      - key: TAXI_NAME
        sync: false

  - type: web
    name: mia-voice-receptionist
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: voice-reception
    # pnpm workspace: install pnpm, then install deps from lockfile, then build all packages.
    # The root build script runs typecheck + pnpm -r --if-present run build (api-server esbuild +
    # receptionist vite build). BASE_PATH defaults to "/" in vite.config.ts when not set.
    buildCommand: npm config set prefix /tmp/npm-global && npm install -g pnpm@10 && export PATH=/tmp/npm-global/bin:$PATH && pnpm install --frozen-lockfile && pnpm run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    # Schema migrations run automatically on every startup via drizzle-orm/migrator.
    # Migration SQL files live in voice-reception/lib/db/drizzle/ (generated from the Drizzle schema).
    # No manual migration step is needed. Just set DATABASE_URL and deploy.
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render sets PORT automatically for web services — do not set it here.
      # Required: PostgreSQL connection for Mia's conversation storage (separate from the automailer DB).
      # Provision a Supabase project (or any Postgres) and paste the connection string here.
      # Format: postgresql://user:password@host:5432/dbname?sslmode=require
      # The server runs CREATE TABLE IF NOT EXISTS on every startup — no separate migration step needed.
      - key: DATABASE_URL
        sync: false
      # Required: OpenAI credentials for voice processing.
      # AI_INTEGRATIONS_OPENAI_API_KEY  → your OpenAI secret key (sk-...)
      # AI_INTEGRATIONS_OPENAI_BASE_URL → https://api.openai.com/v1
      #   (On Replit these are injected by the AI integration; on Render set them explicitly.)
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      # Optional: override the OpenAI model names used by Mia.
      # Defaults: OPENAI_AUDIO_MODEL=gpt-4o-audio-preview, OPENAI_TEXT_MODEL=gpt-4o
      # Only set these if you need a different model (e.g. Azure OpenAI deployment name).
      - key: OPENAI_AUDIO_MODEL
        value: "gpt-4o-audio-preview"
      - key: OPENAI_TEXT_MODEL
        value: "gpt-4o"
      # Required: Beds24 auth for live availability queries
      # Use either BEDS24_TOKEN (long-lived token) or BEDS24_INVITE_CODE (one-time invite)
      - key: BEDS24_TOKEN
        sync: false
      # Optional overrides
      - key: BEDS24_PROPERTY_ID
        value: "297012"
      - key: LOG_LEVEL
        value: info
