  <!-- INP-Optimized: Consolidated Deferred Script Loader -->
  <!-- Single interaction detection system for GTM, Engagement Tracker, Rage Detector -->
  <!-- Reduces 12 event listeners to 3, single callback schedules all scripts with staggered delays -->
  <script>
    (function() {
      // Skip all third-party analytics in development (Replit preview, localhost)
      var isDev = window.location.hostname === 'localhost' ||
                  window.location.hostname.includes('replit.dev') ||
                  window.location.hostname.includes('repl.co');
      if (isDev) return;

      var loaded = { gtm: false, tracker: false };
      
      function scheduleWithIdle(fn, delay) {
        setTimeout(function() {
          if (window.requestIdleCallback) {
            requestIdleCallback(fn, { timeout: 3000 });
          } else {
            setTimeout(fn, 100);
          }
        }, delay);
      }
      
      function loadGTM() {
        if (loaded.gtm) return;
        loaded.gtm = true;
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-532W3HH2');
      }
      
      function loadTracker() {
        if (loaded.tracker) return;
        loaded.tracker = true;
        var s = document.createElement('script');
        s.src = '/engagement-tracker.js';
        document.head.appendChild(s);
      }
      
      function scheduleAllScripts() {
        scheduleWithIdle(loadGTM, 500);
        scheduleWithIdle(loadTracker, 900);
      }
      
      function onFirstInteraction() {
        setTimeout(scheduleAllScripts, 0);
      }
      
      ['click', 'keydown', 'touchstart'].forEach(function(e) {
        window.addEventListener(e, onFirstInteraction, { once: true, passive: true });
      });
      
      // No-interaction fallback. Real visitors trigger the load instantly
      // via the click/keydown/touchstart listeners above; this only fires for
      // visitors who never interact. Set to 15s so PageSpeed audits (which
      // never interact and finish in ~10-12s) don't get billed for the GTM
      // + Google Ads cascade in their TBT score.
      setTimeout(scheduleAllScripts, 15000);
    })();
  </script>

  <script>
    window.RECAPTCHA_SITE_KEY = '6LdENtwrAAAAAPy6JsCXFJLR16ST1BnX-NyPDC7L';
    // Cloudflare Turnstile fallback (used when reCAPTCHA cannot run — e.g.
    // privacy browsers, Brave shields, networks blocking Google domains).
    // Leave empty until you register a free Turnstile widget at
    // https://dash.cloudflare.com/?to=/:account/turnstile, then paste your
    // site key here. Until set, the fallback gracefully no-ops.
    window.TURNSTILE_SITE_KEY = '0x4AAAAAADGh0ZzbK52y0xkt';

    // Lazy loader for reCAPTCHA
    window.loadRecaptcha = (function() {
      let promise = null;

      return function() {
        if (promise) return promise;

        if (window.grecaptcha) {
          promise = Promise.resolve(window.grecaptcha);
          return promise;
        }

        promise = new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://www.google.com/recaptcha/api.js?render=' + window.RECAPTCHA_SITE_KEY;
          script.async = true;
          script.defer = true;
          // Hard timeout so a blocked Google domain doesn't hang forever and
          // the fallback (Turnstile) can take over.
          const timer = setTimeout(() => {
            reject(new Error('reCAPTCHA script load timeout'));
          }, 8000);
          script.onload = () => { clearTimeout(timer); resolve(window.grecaptcha); };
          script.onerror = () => { clearTimeout(timer); reject(new Error('Failed to load reCAPTCHA')); };
          document.head.appendChild(script);
        });

        return promise;
      };
    })();

    // Lazy loader for Cloudflare Turnstile (only loaded if reCAPTCHA fails)
    window.loadTurnstile = (function() {
      let promise = null;

      return function() {
        if (promise) return promise;
        if (!window.TURNSTILE_SITE_KEY) {
          promise = Promise.reject(new Error('Turnstile not configured'));
          return promise;
        }

        if (window.turnstile) {
          promise = Promise.resolve(window.turnstile);
          return promise;
        }

        promise = new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
          script.async = true;
          script.defer = true;
          const timer = setTimeout(() => {
            reject(new Error('Turnstile script load timeout'));
          }, 8000);
          script.onload = () => { clearTimeout(timer); resolve(window.turnstile); };
          script.onerror = () => { clearTimeout(timer); reject(new Error('Failed to load Turnstile')); };
          document.head.appendChild(script);
        });

        return promise;
      };
    })();

  <!-- Pre-calculate sticky header height BEFORE first paint (prevents CLS) -->
  <script>
    (function() {
      // Mobile: 40px topbar + 56px header = 96px
      // Desktop: 40px topbar + 64px header = 104px
      // Set accurate values immediately to prevent layout shift
      var isMobile = window.innerWidth < 768;
      var stackHeight = isMobile ? 96 : 104;
      var headerHeight = isMobile ? 56 : 64;
      
      document.documentElement.style.setProperty('--stack-h', stackHeight + 'px');
      document.documentElement.style.setProperty('--header-h', headerHeight + 'px');
      document.documentElement.style.setProperty('--topbar-h', '40px');
      
      // Recalculate ONCE after DOM is ready (no retries to prevent CLS)
      // Critical: Single recalc ensures React renders, but no recursive retries
      function recalcHeaderHeightOnce() {
        var topbar = document.querySelector(".topbar");
        var header = document.querySelector("header");
        
        // Only update if elements exist (no retry if not ready)
        if (topbar && header) {
          var actualTopbar = topbar.offsetHeight;
          var actualHeader = header.offsetHeight;
          var actualStack = actualTopbar + actualHeader;
          
          // Only update if values changed
          if (actualStack !== stackHeight) {
            document.documentElement.style.setProperty('--stack-h', actualStack + 'px');
            document.documentElement.style.setProperty('--header-h', actualHeader + 'px');
            document.documentElement.style.setProperty('--topbar-h', actualTopbar + 'px');
          }
        }
        // If elements don't exist, skip - App.jsx will handle resize
      }
      
      // Defer recalc until the browser is idle so it never forces layout
      // during the critical render path (PageSpeed previously attributed a
      // ~1s "[unattributed] forced reflow" to this synchronous read).
      function scheduleRecalc() {
        if (window.requestIdleCallback) {
          window.requestIdleCallback(recalcHeaderHeightOnce, { timeout: 2000 });
        } else {
          setTimeout(recalcHeaderHeightOnce, 0);
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', scheduleRecalc);
      } else {
        scheduleRecalc();
      }
    })();
  </script>

  <!-- Critical CSS for instant hero display (before React loads) -->
  <style>
    /* Hero placeholder - non-blocking overlay */
    @keyframes heroDismiss {
      to { opacity: 0; pointer-events: none; }
    }
    #hero-placeholder {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 9999;
      background: #000;
      opacity: 1;
      /* Compositor-thread fade — 5 s delay then 0.4 s fade, independent of JS load.
         NOTE: the full-viewport hero <img> is NEVER an LCP candidate — Chrome excludes
         full-viewport elements as "background" (it counts only toward FCP). The LCP
         element is the static #hero-title text. The delay only keeps the intro visible
         for perceived performance, not to make the image the LCP.
         will-change promotes this element to its own GPU layer for smooth compositing. */
      animation: heroDismiss 0.4s cubic-bezier(0.25, 1, 0.5, 1) 5s forwards;
      will-change: opacity;
      pointer-events: auto;
    }
    #hero-placeholder picture {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Render the hero image as soon as it decodes - no fade.
         Fading from opacity 0 forced visitors to look at a black screen for
         800ms even though the image was already preloaded, which hurt FCP and
         perceived load. (A full-viewport <img> is excluded from LCP, so this only
         ever affected FCP — there is no LCP reason to fade it in.) */
      opacity: 1;
    }
    #hero-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    #hero-placeholder .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

    }
    /* Top gap above the placeholder title. Desktop keeps the original +4rem;
       small phones (<640px) use a tighter -1rem gap so content sits higher and the
       bottom-anchored review block clears the CTA grid. Kept in lockstep with the
       React HeroSection (pt-[calc(var(--header-h)-1rem)] / sm:+4rem) so the title
       y-position is identical and does not jump when the placeholder fades. The
       40px in-flow topbar offsets the React section, so React adds --header-h while
       the fixed placeholder adds --stack-h to land on the same y. */
    #hero-placeholder-content { padding-top: calc(var(--stack-h) + 4rem); }
    /* Desktop subtitle gap (mirrors React HeroSection subtitle `sm:mt-4`). The two-ID
       selector beats the generic `#hero-placeholder p { margin: 0 }` rule above. */
    #hero-placeholder #hero-subtitle { margin-top: 1rem; }
    /* 639.98px (not 639px) to exactly complement Tailwind's sm: = min-width:640px,
       so there's no fractional-width band where React goes mobile but this stays desktop. */
    @media (max-width: 639.98px) {
      #hero-placeholder-content { padding-top: calc(var(--stack-h) - 1rem); }
      /* Small phones: drop the large hero title (already shown in the header) and let
         the subtitle take its top slot. Lockstep with React's `hidden sm:block` h1 +
         `mt-14` mobile subtitle margin so the placeholder and React render identically. */
      #hero-title { display: none; }
      #hero-placeholder #hero-subtitle { margin-top: 8.5rem; }

       font so CTA grid stays clear of the review block. Review block uses bottom-[1rem]
       for this breakpoint so the Trustindex widget clears the CTAs.
       Lockstep with React's [@media(max-width:639.98px)_and_(max-height:700px)]:mt-[7rem]

    @media (max-width: 639.98px) and (max-height: 700px) {

       static block paints the same image from raw HTML instead, then is removed

       shown only on /book-direct by the inline script below. Layout approximates

    @media (min-width: 768px) and (max-width: 1023.98px) {

  <!-- Hero placeholder timer (shows for 5 seconds on first visit only) -->
  <script>
    (function() {
      // The hero overlay is a homepage-only intro. On any other route (e.g.
      // /book-direct, /booking-confirmed, deep links) it shows the wrong hero
      // (hero01 + "DEVOCEAN Lodge") and just delays the page, so hide it before
      // first paint and bail out — no overlay, no hero-active, no timer.
      var path = window.location.pathname;
      var hash = window.location.hash;
      // Also bail when the homepage is loaded with a section hash (e.g.
      // "/#experiences" from a "Back to Experiences" link). The visitor is
      // targeting that section, not the hero intro, so a 5 s full-screen
      // overlay would just cover the section they navigated to.
      if ((path !== '/' && path !== '/index.html') || (hash && hash.length > 1)) {
        var hideStyle = document.createElement('style');
        hideStyle.textContent = '#hero-placeholder{display:none!important}';
        document.head.appendChild(hideStyle);
        return;
      }

      // Check if user has already seen the hero
      // Use sessionStorage (persists during SPA navigation, clears on tab close)
      // and localStorage (persists across browser sessions)
      var heroSeenThisSession, heroSeenEver;
      try {
        heroSeenThisSession = sessionStorage.getItem('devocean-hero-seen');
        heroSeenEver = localStorage.getItem('devocean-hero-seen');
      } catch (e) {
        // Storage unavailable - treat as first visit
        heroSeenThisSession = null;
        heroSeenEver = null;
      }
      
      // Wait for DOM to be ready
      function init() {
        var placeholder = document.getElementById('hero-placeholder');
        var root = document.getElementById('root');
        
        // Skip hero if already shown this session OR returning visitor
        // Note: PageSpeed and real users both see the optimized placeholder for accurate LCP measurement
        if (heroSeenThisSession || heroSeenEver) {
          // Skip hero - show main site immediately
          if (placeholder) {
            placeholder.style.animation = 'none'; // cancel compositor animation
            placeholder.style.display = 'none';
          }
          return;
        }
        
        // First visit - show hero opening sequence
        // Note: Content renders underneath, hero is just a visual overlay
        document.documentElement.classList.add('hero-active');
        
        // Mark hero as seen immediately (both session and persistent)
        try {
          sessionStorage.setItem('devocean-hero-seen', 'true');
          localStorage.setItem('devocean-hero-seen', 'true');
        } catch (e) {
          // Storage unavailable - silent fail
        }
        
        // CSS animation (heroDismiss, 5 s delay, 0.4 s fade) handles the visual fade on
        // the compositor thread — independent of main-thread JS load.
        // The 5 s delay keeps the intro visible for perceived performance. (The hero
        // image only counts toward FCP — a full-viewport <img> is excluded from LCP —
        // and the LCP element is the static #hero-title text.)
        // This JS timeout only cleans up the DOM after the animation finishes.
        setTimeout(function() {
          if (placeholder) {
            placeholder.style.display = 'none';
          }
          // hero-active intentionally NOT removed here — React's App.jsx useEffect
          // removes it after first mount, keeping the dark background until content is ready.
        }, 5500); // 5000 ms delay + 400 ms fade + 100 ms buffer
      }
      
      // Run init when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>

  <!-- Locale initializer (moved to end for mobile FCP optimization) -->
  <script>
    (function () {
      try {
        var SUPPORTED = ["en", "pt", "nl", "fr", "it", "de", "es", "ptmz"];
        var src = localStorage.getItem("site.lang_source") || "auto";
        var curr = localStorage.getItem("site.currency") || null;

          if (base === "pt" && /-mz$/i.test(nav)) base = "ptmz";
          if (base === "pt-pt" || base === "pt-br") base = "pt";
          if (SUPPORTED.indexOf(base) === -1) base = "en";
          return base;
        }
        function inferCurrency(langNow) {
          if (window.__CF_COUNTRY__) {
            var CC2CUR = {
              GB: "GBP", IE: "EUR", NL: "EUR", BE: "EUR", FR: "EUR", DE: "EUR", IT: "EUR", ES: "EUR", PT: "EUR",

              ZA: "ZAR", MZ: "MZN", KE: "KES", TZ: "TZS", UG: "UGX", ZW: "USD", BW: "BWP", NA: "NAD", 
              EG: "EGP", MA: "MAD", AO: "AOA", GH: "GHS", NG: "NGN",
              US: "USD", CA: "CAD", MX: "MXN", BR: "BRL", AR: "ARS", CL: "CLP", CO: "COP", PE: "PEN",
              CN: "CNY", JP: "JPY", KR: "KRW", IN: "INR", TH: "THB", SG: "SGD", MY: "MYR", ID: "IDR", 
              PH: "PHP", VN: "VND", AE: "AED", SA: "SAR", RU: "RUB",
              AU: "AUD", NZ: "NZD"
            };
            var cc = String(window.__CF_COUNTRY__).toUpperCase();
            if (CC2CUR[cc]) return CC2CUR[cc];
          }
          var list = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language].filter(Boolean);
          var HINT = { "de": "EUR", "nl": "EUR", "fr": "EUR", "it": "EUR", "es": "EUR", "en-gb": "GBP", "en-us": "USD", "en-za": "ZAR" };
          var first = (list[0] || "").toLowerCase();

          return HINT[first] || HINT[firstBase] || (langNow === "ptmz" ? "MZN" : "USD");

        if (!localStorage.getItem("site.lang_source")) {
          localStorage.setItem("site.lang_source", "auto");

        if (src === "auto") {
          var detectedLang = null;
          if (window.__CF_COUNTRY__ && window.__CF_COUNTRY__ !== '') {
            var CC2LANG = {

              PL: "pl",
              JP: "ja", CN: "zh", RU: "ru"
            };
            var cc = String(window.__CF_COUNTRY__).toUpperCase();
            detectedLang = CC2LANG[cc] || null;
          }
          if (!detectedLang) {
            detectedLang = normLang(navigator.language);

          localStorage.setItem("site.lang", detectedLang);
          localStorage.setItem("site.currency", inferCurrency(detectedLang));
          lang = detectedLang;

        document.documentElement.setAttribute("lang", lang || "en");

  <!-- Global locale setter -->
  <script>
    (function () {
      if (window.setSiteLocale) return;
      function normLang(s) {
        s = String(s || '').toLowerCase().replace('_', '-');
        if (s === 'pt-mz') s = 'ptmz';
        if (s === 'pt-pt' || s === 'pt-br') s = 'pt';
        if (/^[a-z]{2}-[a-z]{2}$/.test(s)) s = s.slice(0, 2);
        return s || 'en';
      }
      function clampCur(c) {
        if (!c) return null;
        c = String(c).toUpperCase().replace(/[^A-Z]/g, '');
        return c.length === 3 ? c : null;
      }
      function setPrefCookies(lang, currency) {
        var host = location.hostname;
        var isLocal = (host === "localhost") || (host === "127.0.0.1") || /^\d+\.\d+\.\d+\.\d+$/.test(host);
        var domainPart = isLocal ? "" : ";domain=.devoceanlodge.com";
        var securePart = location.protocol === "https:" ? ";Secure" : "";
        var base = ";max-age=31536000;path=/;SameSite=Lax" + domainPart + securePart;
        if (lang) document.cookie = "lang=" + lang + base;
        if (currency) document.cookie = "currency=" + currency + base;
      }
      window.setSiteLocale = function setSiteLocale({ lang, currency } = {}) {
        var L, C;
        try {
          L = lang ? normLang(lang) : (localStorage.getItem('site.lang') || 'en');
          C = currency ? clampCur(currency) : (localStorage.getItem('site.currency') || 'USD');
        } catch (e) {
          L = lang ? normLang(lang) : 'en';
          C = currency ? clampCur(currency) : 'USD';
        }
        try {
          localStorage.setItem('site.lang', L);
          localStorage.setItem('site.currency', C || 'USD');
          localStorage.setItem('site.lang_source', 'user');
          document.documentElement.setAttribute('lang', L);
        } catch { }
        setPrefCookies(L, C || 'USD');
      };
    })();
  </script>

  <script>
    (function () {
      var isDev = window.location.hostname === 'localhost' ||
        window.location.hostname.includes('replit.dev') ||
        window.location.hostname.includes('repl.co');
      if (isDev) return;
      var ping = function () {
        try {
          fetch('%%MIA_URL%%/api/health', {
            method: 'GET',
            priority: 'low',
            mode: 'no-cors',
            cache: 'no-store'
          }).catch(function () {});
        } catch (_) {}
      };
      if (document.readyState === 'complete') {
        setTimeout(ping, 1000);
      } else {
        window.addEventListener('load', function () { setTimeout(ping, 1000); }, { once: true });
      }
    })();
  </script>
